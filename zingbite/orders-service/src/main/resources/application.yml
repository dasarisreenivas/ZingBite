server:
  port: 8082
  servlet:
    session:
      cookie:
        name: JSESSIONID

spring:
  application:
    name: orders-service
  session:
    store-type: redis
  data:
    redis:
      host: ${ZINGBITE_REDIS_HOST:127.0.0.1}
      port: ${ZINGBITE_REDIS_PORT:6379}
  datasource:
    url: ${ZINGBITE_DB_URL:jdbc:mysql://localhost:3306/ZingBite}
    username: ${ZINGBITE_DB_USER:root}
    password: ${ZINGBITE_DB_PASSWORD:Srinivas@192004}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
