server:
  address: ${ZINGBITE_SERVICE_BIND_ADDRESS:127.0.0.1}
  port: 8083
  servlet:
    session:
      cookie:
        name: JSESSIONID
        http-only: true
        same-site: lax
        secure: ${ZINGBITE_COOKIE_SECURE:false}

spring:
  application:
    name: restaurant-service
  session:
    store-type: redis
  data:
    redis:
      host: ${ZINGBITE_REDIS_HOST:127.0.0.1}
      port: ${ZINGBITE_REDIS_PORT:6379}
  datasource:
    url: ${ZINGBITE_DB_URL:jdbc:mysql://localhost:3306/ZingBite}
    username: ${ZINGBITE_DB_USER:root}
    password: ${ZINGBITE_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
