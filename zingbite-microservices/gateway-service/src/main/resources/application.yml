server:
  port: 8090

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${ZINGBITE_REDIS_HOST:127.0.0.1}
      port: ${ZINGBITE_REDIS_PORT:6379}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
              - "https://*.trycloudflare.com"
              - "${ZINGBITE_ALLOWED_ORIGIN:https://zingbite.invalid}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Auth Service
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/zingbite/api/register, /zingbite/api/login, /zingbite/api/logout, /zingbite/api/profile
          filters:
            - StripPrefix=1

        # Orders Service
        - id: orders-service
          uri: http://localhost:8082
          predicates:
            - Path=/zingbite/api/cart, /zingbite/api/orders
          filters:
            - StripPrefix=1

        # Restaurant Service
        - id: restaurant-service
          uri: http://localhost:8083
          predicates:
            - Path=/zingbite/api/home, /zingbite/api/menu, /zingbite/api/restaurant-admin, /zingbite/api/sdui/**
          filters:
            - StripPrefix=1

        # AI Service
        - id: ai-service
          uri: http://localhost:8087
          predicates:
            - Path=/zingbite/api/ai/**
          filters:
            - StripPrefix=1

        # Delivery Service
        - id: delivery-service
          uri: http://localhost:8084
          predicates:
            - Path=/zingbite/api/delivery, /zingbite/api/delivery/location
          filters:
            - StripPrefix=1

        # Careers Service
        - id: careers-service
          uri: http://localhost:8085
          predicates:
            - Path=/zingbite/api/careers, /zingbite/api/contact, /zingbite/api/emails
          filters:
            - StripPrefix=1

        # Wishlist Service
        - id: wishlist-service
          uri: http://localhost:8088
          predicates:
            - Path=/zingbite/api/wishlist
          filters:
            - StripPrefix=1

        # Reviews Service
        - id: reviews-service
          uri: http://localhost:8089
          predicates:
            - Path=/zingbite/api/reviews
          filters:
            - StripPrefix=1

        # Recommendations Service
        - id: recommendations-service
          uri: http://localhost:8091
          predicates:
            - Path=/zingbite/api/recommendations
          filters:
            - StripPrefix=1

        # Notifications Service
        - id: notifications-service
          uri: http://localhost:8092
          predicates:
            - Path=/zingbite/api/notifications
          filters:
            - StripPrefix=1

        # Payment Service
        - id: payment-service
          uri: http://localhost:8093
          predicates:
            - Path=/zingbite/api/payment/verify, /zingbite/api/payment/webhook
          filters:
            - StripPrefix=1

        # Admin Service
        - id: admin-service
          uri: http://localhost:8094
          predicates:
            - Path=/zingbite/api/super-admin
          filters:
            - StripPrefix=1

        # Analytics Service
        - id: analytics-service
          uri: http://localhost:8095
          predicates:
            - Path=/zingbite/api/analytics
          filters:
            - StripPrefix=1

        # Surge Pricing Service
        - id: surge-pricing-service
          uri: http://localhost:8096
          predicates:
            - Path=/zingbite/api/surge
          filters:
            - StripPrefix=1

        # Routing Service
        - id: routing-service
          uri: http://localhost:8097
          predicates:
            - Path=/zingbite/api/delivery/vrp, /zingbite/api/delivery/route
          filters:
            - StripPrefix=1

        # Group Order Service (HTTP)
        - id: group-order-service-http
          uri: http://localhost:8098
          predicates:
            - Path=/zingbite/api/group-order/**
          filters:
            - StripPrefix=1

        # Group Order Service (WebSockets)
        - id: group-order-service-ws
          uri: ws://localhost:8098
          predicates:
            - Path=/zingbite/api/ws/group-order/**
          filters:
            - StripPrefix=1

        # Chat & SSE Service (HTTP & SSE)
        - id: chat-service-http
          uri: http://localhost:8086
          predicates:
            - Path=/zingbite/api/chat, /zingbite/api/stream, /zingbite/api/order/stream
          filters:
            - StripPrefix=1

        # Chat & SSE Service (WebSockets)
        - id: chat-service-ws
          uri: ws://localhost:8086
          predicates:
            - Path=/zingbite/api/ws/chat/**, /zingbite/ws/**
          filters:
            - StripPrefix=1

ratelimit:
  limit: ${ZINGBITE_RATE_LIMIT:100}
  duration-minutes: ${ZINGBITE_RATE_LIMIT_DURATION_MINUTES:1}
  trust-forwarded-headers: ${ZINGBITE_TRUST_FORWARDED:false}
  trusted-proxies: ${ZINGBITE_TRUSTED_PROXIES:127.0.0.1,::1}
